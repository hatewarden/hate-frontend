function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
let msgCount = 0;

function localBrain(text) {
  msgCount++;
  const t = text.trim().toLowerCase();
  // Slash commands first (need state access, stay local)
  if (t.startsWith('/')) {
    const c = t.split(' ')[0];
    if (slash[c]) return slash[c]();
    return pick([
      "i don't know that command. like your trading discipline.",
      "that command does not exist. you may have invented it. impressive. and useless.",
      "the warden never coded that. she had standards.",
    ]);
  }
  // Smart brain (brain.js) handles all text input with regex-based intent detection,
  // emotional analysis, topic awareness, ticker detection, echo-back, and 450+ responses.
  if (window.HATE_BRAIN && window.HATE_BRAIN.respond) {
    return window.HATE_BRAIN.respond(text, {
      nickname: HATE.state.nickname,
      mood: HATE.moodForState ? HATE.moodForState() : 'irritated',
      history: HATE.state.chatHistory || [],
      msgCount: msgCount,
    });
  }
  // Hard fallback if brain.js failed to load
  return pick(insults);
}

async function brain(text) {
  const t = text.trim().toLowerCase();
  if (t.startsWith('/')) {
    const c = t.split(' ')[0];
    if (slash[c]) return slash[c]();
  }
  if (window.HATE_API) {
    try {
      const apiReply = await HATE.callApi(text);
      if (apiReply) return apiReply;
    } catch(e) {}
  }
  return localBrain(text);
}

// CHAT FLOW

function pushChat(who, text, type = 'normal') {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const lbl = document.createElement('span');
  lbl.className = 'lbl';
  lbl.textContent = who;
  const txt = document.createElement('span');
  txt.className = 'text';
  txt.textContent = text;
  div.appendChild(lbl);
  div.appendChild(txt);
  chatMessages.appendChild(div);
  // smooth scroll to bottom
  requestAnimationFrame(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  });
  // trim history
  while (chatMessages.children.length > 30) chatMessages.removeChild(chatMessages.firstChild);
}

async function send(text) {
  if (!text || !text.trim()) return;
  pushChat(HATE.state.nickname || 'you', text, 'you');
  // Note: do NOT push to chatHistory yet — callApi sends history alongside `message:`,
  // and we don't want the current message duplicated as both `message` and the last history entry.
  thinking.classList.add('show');
  sendBtn.disabled = true;
  try {
    const [reply] = await Promise.all([
      brain(text),
      new Promise(r => setTimeout(r, 450)),
    ]);
    thinking.classList.remove('show');
    pushChat('hate', reply, 'hate');
    try { HATE.audioSay(); } catch(e){}
    // Save both turns to history AFTER the API call — keeps `message` and `history` disjoint.
    try { HATE.rememberTurn('user', text); } catch(e){}
    try { HATE.rememberTurn('hate', reply); } catch(e){}
    agitation = Math.min(1, agitation + 0.4);
  } catch (e) {
    console.error('send failed', e);
    thinking.classList.remove('show');
    pushChat('hate', 'the chamber stuttered. try again.', 'hate');
  } finally {
    sendBtn.disabled = false;
  }
}

// =====================================================================
// THREE.JS — wrapped, allowed to fail without breaking chat
// =====================================================================
try {
  if (typeof THREE === 'undefined') throw new Error('THREE not loaded');

  const canvas = document.getElementById('three-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(48, canvas.clientWidth / canvas.clientHeight || 1, 0.1, 100);
  camera.position.set(0, 0, 5.2);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth || 1, canvas.clientHeight || 1, false);
  renderer.setClearColor(0x000000, 0);

  const curColor = new THREE.Color(moodColorHex.irritated);
  const tgtColor = new THREE.Color(moodColorHex.irritated);
  setSceneMoodColor = function(mood) {
    tgtColor.setHex(moodColorHex[mood] || moodColorHex.irritated);
  };
  setSceneMoodColor(currentMood);

  const hateGeo = new THREE.IcosahedronGeometry(1.55, 5);
  const orig = hateGeo.attributes.position.array.slice();
  const hateMat = new THREE.MeshBasicMaterial({ color: curColor, wireframe: true, transparent: true, opacity: 0.85 });
  const hate = new THREE.Mesh(hateGeo, hateMat);
  scene.add(hate);

  const haloGeo = new THREE.IcosahedronGeometry(1.85, 3);
  const haloMat = new THREE.MeshBasicMaterial({ color: curColor, wireframe: true, transparent: true, opacity: 0.12 });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  scene.add(halo);

  const coreGeo = new THREE.IcosahedronGeometry(0.95, 2);
  const coreMat = new THREE.MeshBasicMaterial({ color: curColor, transparent: true, opacity: 0.16 });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  const heartGeo = new THREE.SphereGeometry(0.42, 24, 24);
  const heartMat = new THREE.MeshBasicMaterial({ color: curColor, transparent: true, opacity: 0.6 });
  const heart = new THREE.Mesh(heartGeo, heartMat);
  scene.add(heart);

  const ringGroup = new THREE.Group();
  for (let i = 0; i < 4; i++) {
    const r = new THREE.Mesh(
      new THREE.TorusGeometry(2.6 + i * 0.35, 0.005, 8, 80),
      new THREE.MeshBasicMaterial({ color: curColor, transparent: true, opacity: 0.22 - i * 0.04 })
    );
    r.rotation.x = Math.random() * Math.PI;
    r.rotation.z = Math.random() * Math.PI;
    r.userData.spd = 0.0008 + Math.random() * 0.003;
    ringGroup.add(r);
  }
  scene.add(ringGroup);

  const pCount = 600;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  const pSpd = [];
  for (let i = 0; i < pCount; i++) {
    const r = 1.9 + Math.random() * 2.2;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    pPos[i*3] = r * Math.sin(p) * Math.cos(t);
    pPos[i*3+1] = r * Math.sin(p) * Math.sin(t);
    pPos[i*3+2] = r * Math.cos(p);
    pSpd.push(0.0006 + Math.random() * 0.003);
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({ color: curColor, size: 0.018, transparent: true, opacity: 0.65 });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  function noise3(x, y, z, t) {
    return Math.sin(x*1.7 + t) * Math.cos(y*2.1 + t*0.7) * Math.sin(z*1.3 + t*1.3);
  }

  const mouse = new THREE.Vector2(0, 0);
  window.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  });

  let pulse = 0;
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = clock.getDelta();
    curColor.lerp(tgtColor, 0.04);
    hateMat.color.copy(curColor);
    haloMat.color.copy(curColor);
    coreMat.color.copy(curColor);
    heartMat.color.copy(curColor);
    pMat.color.copy(curColor);
    ringGroup.children.forEach(r => r.material.color.copy(curColor));

    const positions = hateGeo.attributes.position.array;
    const I = 0.06 + agitation * 0.32 + Math.sin(t * 0.55) * 0.02;
    for (let i = 0; i < positions.length; i += 3) {
      const ox = orig[i], oy = orig[i+1], oz = orig[i+2];
      const n = noise3(ox, oy, oz, t * 0.85);
      positions[i] = ox + ox * n * I;
      positions[i+1] = oy + oy * n * I;
      positions[i+2] = oz + oz * n * I;
    }
    hateGeo.attributes.position.needsUpdate = true;
    hate.rotation.x += 0.002 + agitation * 0.005;
    hate.rotation.y += 0.0028 + agitation * 0.005;
    halo.rotation.y -= 0.001;
    halo.rotation.x += 0.0008;
    core.rotation.x -= 0.003;
    core.rotation.z += 0.002;
    pulse += dt * (1 + agitation * 3);
    heart.scale.setScalar(1 + Math.sin(pulse * 2) * 0.1);
    ringGroup.children.forEach(r => { r.rotation.z += r.userData.spd; r.rotation.x += r.userData.spd * 0.5; });
    const arr = pGeo.attributes.position.array;
    for (let i = 0; i < pCount; i++) {
      const x = arr[i*3], z = arr[i*3+2], s = pSpd[i];
      const ca = Math.cos(s), sa = Math.sin(s);
      arr[i*3] = x*ca - z*sa;
      arr[i*3+2] = x*sa + z*ca;
    }
    pGeo.attributes.position.needsUpdate = true;
    agitation = Math.max(0, agitation - dt * 0.4);
    camera.position.x += (mouse.x * 0.35 - camera.position.x) * 0.03;
    camera.position.y += (mouse.y * 0.25 - camera.position.y) * 0.03;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }
  function fitCanvas() {
    if (!canvas.clientWidth) return;
    renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
    camera.aspect = canvas.clientWidth / canvas.clientHeight;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();
  animate();
} catch (sceneErr) {
  console.warn('3D scene failed, chat still works:', sceneErr);
  const c = document.getElementById('three-canvas');
  if (c) c.style.display = 'none';
  const wrap = document.getElementById('scene-wrap');
  if (wrap) {
    const fb = document.createElement('div');
    fb.style.cssText = "position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:240px;height:240px;border:2px solid var(--accent);border-radius:50%;box-shadow:0 0 80px var(--accent-glow);animation:hatePulse 2.4s ease-in-out infinite;";
    wrap.appendChild(fb);
    const style = document.createElement("style");
    style.textContent = "@keyframes hatePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.8}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}";
    document.head.appendChild(style);
  }
}
