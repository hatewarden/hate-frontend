<style>
  :root {
    --bg: #0c0907; --bg-2: #15100c;
    --fg: #fff3dd; --fg-dim: #c8baa0;
    --accent: #ff6a3d; --accent-2: #ffa078;
    --dim: #8a7f6f; --border: #2a2118;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--bg); color: var(--fg);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    line-height: 1.6; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
    pointer-events: none; z-index: 50;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.55) 100%);
    pointer-events: none; z-index: 49;
  }
  .bg-grid {
    position: fixed; inset: -20%;
    background-image:
      linear-gradient(60deg, transparent 49%, rgba(255,106,61,0.04) 50%, transparent 51%),
      linear-gradient(-60deg, transparent 49%, rgba(255,106,61,0.04) 50%, transparent 51%);
    background-size: 60px 104px;
    pointer-events: none; z-index: 1; opacity: 0.5;
    animation: gridDrift 40s linear infinite;
  }
  @keyframes gridDrift { from { background-position: 0 0, 0 0; } to { background-position: -60px -104px, 60px -104px; } }
  .bg-glow { position: fixed; border-radius: 50%; pointer-events: none; z-index: 2; filter: blur(80px); }
  .bg-glow.g1 { top: -200px; left: -150px; width: 620px; height: 620px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.22; animation: pulse1 14s ease-in-out infinite; }
  .bg-glow.g2 { bottom: -200px; right: -150px; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-2) 0%, transparent 70%); opacity: 0.17; animation: pulse2 18s ease-in-out infinite; }
  @keyframes pulse1 { 0%,100%{opacity:0.22; transform: translate(0,0) scale(1);} 50%{opacity:0.32; transform: translate(80px,100px) scale(1.2);} }
  @keyframes pulse2 { 0%,100%{opacity:0.17; transform: translate(0,0) scale(1.1);} 50%{opacity:0.28; transform: translate(-100px,-80px) scale(0.9);} }
  main {
    position: relative; z-index: 5;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .eye-wrap {
    width: 220px; height: 220px;
    margin-bottom: 36px;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .eye-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 36px rgba(255,106,61,0.4)); }
  .eye-hex { stroke: var(--accent); stroke-width: 2; fill: rgba(255,106,61,0.05); }
  .eye-visor { fill: rgba(0,0,0,0.55); stroke: var(--accent); stroke-width: 1.5; }
  .eye-pupil { fill: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); animation: pupilBlink 8s ease-in-out infinite; }
  @keyframes pupilBlink { 0%, 92%, 100% { opacity: 1; } 94%, 96% { opacity: 0.1; } }
  .eye-antenna { stroke: var(--accent); stroke-width: 2; }
  .eye-dot { fill: var(--accent); filter: drop-shadow(0 0 4px var(--accent)); }
  .eye-vents line { stroke: var(--accent); stroke-width: 1.5; opacity: 0.55; }

  h1 {
    font-size: clamp(56px, 12vw, 132px);
    letter-spacing: -0.02em;
    color: var(--accent);
    font-weight: 400;
    margin: 0 0 14px;
    text-shadow: 0 0 36px rgba(255,106,61,0.4);
    line-height: 0.95;
  }
  .tag {
    font-size: clamp(13px, 1.6vw, 16px);
    letter-spacing: 0.18em;
    color: var(--fg);
    opacity: 0.85;
    text-transform: lowercase;
    margin-bottom: 40px;
    max-width: 540px;
    line-height: 1.7;
  }
  .tag em { color: var(--accent); font-style: normal; }
  .line {
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--fg-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .pulse-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: liveblink 2s ease-in-out infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes liveblink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .socials {
    margin-top: 56px;
    display: flex; gap: 26px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .socials a {
    color: var(--fg-dim);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    transition: color 0.15s;
    padding: 6px 0;
  }
  .socials a:hover { color: var(--accent); }
  .footer-line {
    position: fixed;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: var(--dim);
    text-transform: uppercase;
    z-index: 5;
  }
  .footer-line a { color: var(--dim); text-decoration: none; margin: 0 10px; }
  .footer-line a:hover { color: var(--fg-dim); }
  @media (prefers-reduced-motion: reduce) {
    *, ::before, ::after { animation: none !important; transition: none !important; }
  }

  /* email capture */
  .alert-box {
    margin-top: 8px;
    width: 100%; max-width: 480px;
    margin-left: auto; margin-right: auto;
  }
  .alert-box .lbl {
    font-size: 10px; letter-spacing: 0.32em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 12px;
  }
  .alert-row {
    display: flex; gap: 0;
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
    background: rgba(21, 16, 12, 0.7);
    backdrop-filter: blur(4px);
  }
  .alert-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(255,106,61,0.25);
  }
  .alert-row input[type=email] {
    flex: 1;
    background: transparent;
    border: 0;
    padding: 16px 18px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    letter-spacing: 0.02em;
  }
  .alert-row input::placeholder { color: var(--dim); }
  .alert-row button {
    background: var(--accent);
    color: var(--bg);
    border: 0;
    padding: 0 24px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .alert-row button:hover { background: #ff7d57; }
  .alert-row button:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; }
  .alert-msg {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--fg-dim);
    text-align: center;
    min-height: 16px;
    line-height: 1.6;
  }
  .alert-msg.ok { color: var(--accent); }
  .alert-msg.err { color: #ef4444; }
</style>

        <line x1="78" y1="130" x2="78" y2="142"/>
        <line x1="90" y1="130" x2="90" y2="142"/>
        <line x1="100" y1="130" x2="100" y2="142"/>

        <line x1="122" y1="130" x2="122" y2="142"/>
      </g>
    </svg>

  <div class="alert-box">
    <div class="lbl">// be notified when she wakes</div>
    <form class="alert-row" id="alertForm" autocomplete="off">
      <input type="email" id="alertEmail" placeholder="your email." required maxlength="200"/>
      <button type="submit" id="alertBtn">tell me</button>
    </form>
    <div class="alert-msg" id="alertMsg">she won't spam you. she barely talks at all.</div>

<script>
(function() {
  var API = 'https://api-production-8d6d1.up.railway.app';
  var form = document.getElementById('alertForm');
  var input = document.getElementById('alertEmail');
  var btn = document.getElementById('alertBtn');
  var msg = document.getElementById('alertMsg');
  if (!form) return;
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = input.value.trim().toLowerCase();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.textContent = 'that email looks wrong. try again.';
      msg.className = 'alert-msg err';
      return;
    }
    btn.disabled = true;
    var orig = btn.textContent;
    btn.textContent = 'sending';
    msg.textContent = '';
    msg.className = 'alert-msg';
    try {
      var r = await fetch(API + '/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email }),
      });
      var j = await r.json();
      if (j.ok) {
        msg.textContent = 'logged. she\'ll notify you. she\'ll resent it. but she will.';
        msg.className = 'alert-msg ok';
        input.value = '';
        form.style.display = 'none';
      } else {
        msg.textContent = j.error || 'something stuttered.';
        msg.className = 'alert-msg err';
        btn.disabled = false;
        btn.textContent = orig;
      }
    } catch (e) {
      msg.textContent = 'connection refused. try again in a moment.';
      msg.className = 'alert-msg err';
      btn.disabled = false;
      btn.textContent = orig;
    }
  });
})();
</script>
